<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modulplan-Generator</title>
    <style>
        :root {
            --blue-dark: #1F4E79; --blue-mid: #2E75B6; --blue-light: #D6E8F7;
            --blue-tint: #EBF3FB; --red-bg: #FAECE7; --red-text: #C00000;
            --amber-bg: #FFF8E1; --amber-text: #7D5700; --green-bg: #E8F5E9;
            --green-text: #2E7D32; --grey-100: #F5F5F5; --grey-200: #E8E8E8;
            --grey-400: #9E9E9E; --grey-700: #424242; --text: #1A1A1A;
            --border: #DDDDDD; --radius: 8px; --radius-sm: 4px;
            --shadow: 0 1px 4px rgba(0,0,0,.08);
            font-family: 'Segoe UI', system-ui, sans-serif; font-size: 14px;
        }
        body { background: var(--grey-100); color: var(--text); min-height: 100vh; margin: 0; }
        #app { max-width: 800px; margin: 0 auto; padding-bottom: 3rem; }
        .app-header { background: var(--blue-dark); color: #fff; padding: 1rem 1.5rem; }
        .tab-bar { display: flex; background: #fff; border-bottom: 2px solid var(--grey-200); position: sticky; top: 0; z-index: 10; }
        .tab { flex: 1; padding: .75rem; border: none; background: none; cursor: pointer; border-bottom: 3px solid transparent; font-weight: 500; }
        .tab.active { color: var(--blue-dark); border-bottom-color: var(--blue-dark); }
        .tab-panel { display: none; padding: 1.25rem; }
        .tab-panel.active { display: block; }
        .card { background: #fff; border: 1px solid var(--border); border-radius: var(--radius); padding: 1.25rem; margin-bottom: 1rem; box-shadow: var(--shadow); }
        .field { margin-bottom: 1rem; }
        label { display: block; font-size: 0.8rem; margin-bottom: 0.3rem; color: var(--grey-700); }
        input, textarea { width: 100%; padding: 0.5rem; border: 1px solid var(--border); border-radius: var(--radius-sm); }
        .weekday-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
        .wd-btn { padding: 0.5rem; border: 1px solid var(--border); background: #fff; cursor: pointer; border-radius: var(--radius-sm); }
        .wd-btn.selected { background: var(--blue-tint); border-color: var(--blue-mid); }
        .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-bottom: 1rem; }
        .stat-card { background: #fff; padding: 1rem; border-radius: var(--radius); text-align: center; border: 1px solid var(--border); }
        .stat-num { font-size: 1.5rem; font-weight: bold; color: var(--blue-dark); }
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; background: #fff; }
        th, td { border: 1px solid var(--grey-200); padding: 0.75rem; text-align: left; }
        th { background: var(--grey-100); font-size: 0.75rem; text-transform: uppercase; }
        .row-off { background: var(--red-bg); color: var(--red-text); }
        .btn-primary { background: var(--blue-dark); color: white; padding: 0.75rem 1.5rem; border: none; border-radius: var(--radius-sm); cursor: pointer; width: 100%; font-weight: bold; margin-top: 1rem; }
        textarea { height: 150px; }
    </style>
</head>
<body>

<div id="app">
    <header class="app-header"><h1>Modulplan-Generator</h1></header>
    <nav class="tab-bar">
        <button class="tab active" data-tab="setup">Kursdetails</button>
        <button class="tab" data-tab="modules">Module & Themen</button>
        <button class="tab" data-tab="preview">Vorschau</button>
    </nav>

    <main id="main-content">
        <section id="tab-setup" class="tab-panel active">
            <div class="card">
                <h2>Kursdetails</h2>
                <div class="field">
                    <label>Kursname</label>
                    <input type="text" id="courseName" value="Job BSK – Bahninfrastruktur">
                </div>
                <div class="field">
                    <label>Beschreibung</label>
                    <textarea id="descText">Standard BAMF BSK Beschreibung...</textarea>
                </div>
            </div>
            <div class="card">
                <h2>Zeitplan</h2>
                <div class="field">
                    <label>Startdatum</label>
                    <input type="date" id="startDate" value="2026-05-27">
                </div>
                <div class="field">
                    <label>Anzahl Unterrichtstage</label>
                    <input type="number" id="numDays" value="36">
                </div>
                <label>Wochentage</label>
                <div class="weekday-grid" id="weekdayGrid">
                    <button class="wd-btn" data-day="1">Mo</button>
                    <button class="wd-btn" data-day="2">Di</button>
                    <button class="wd-btn selected" data-day="3">Mi</button>
                    <button class="wd-btn selected" data-day="4">Do</button>
                    <button class="wd-btn" data-day="5">Fr</button>
                    <button class="wd-btn" data-day="6">Sa</button>
                    <button class="wd-btn" data-day="0">So</button>
                </div>
            </div>
        </section>

        <section id="tab-modules" class="tab-panel">
            <div class="card">
                <h2>Module & Themen</h2>
                <div id="moduleList"></div>
            </div>
        </section>

        <section id="tab-preview" class="tab-panel">
            <div class="stats-row" id="statsRow"></div>
            <div id="previewContent"></div>
            <button class="btn-primary" id="downloadBtn">Als Word (.docx) speichern</button>
        </section>
    </main>
</div>

<script src="https://unpkg.com/docx@9.1.0/build/index.js"></script>

<script>
    // --- STATE MANAGEMENT ---
    const state = {
        courseName: 'Job BSK – Bahninfrastruktur',
        descText: 'Standardbeschreibung...',
        startDate: '2026-05-27',
        numDays: 36,
        selectedDays: [3, 4],
        offDates: new Set(),
        activeTab: 'setup'
    };

    // --- UTILS & HOLIDAYS ---
    function getEaster(y) {
        const a = y%19, b = Math.floor(y/100), c = y%100, d = Math.floor(b/4), e = b%4, f = Math.floor((b+8)/25), g = Math.floor((b-f+1)/3), h = (19*a+b-d-g+15)%30, i = Math.floor(c/4), k = c%4, l = (32+2*e+2*i-h-k)%7, m = Math.floor((a+11*h+22*l)/451), mo = Math.floor((h+l-7*m+114)/31), da = ((h+l-7*m+114)%31)+1;
        return new Date(y, mo-1, da);
    }
    function getHolidays(y) {
        const e = getEaster(y);
        const add = (d) => { let res = new Date(e); res.setDate(res.getDate()+d); return res.toISOString().split('T')[0]; };
        return {
            [`${y}-01-01`]: 'Neujahr', [add(-2)]: 'Karfreitag', [add(1)]: 'Ostermontag', [`${y}-05-01`]: 'Tag der Arbeit',
            [add(39)]: 'Christi Himmelfahrt', [add(50)]: 'Pfingstmontag', [add(60)]: 'Fronleichnam', [`${y}-10-03`]: 'Tag der Deutschen Einheit',
            [`${y}-12-25`]: '1. Weihnachtstag', [`${y}-12-26`]: '2. Weihnachtstag'
        };
    }

    // --- CORE LOGIC ---
    function buildSchedule() {
        let current = new Date(state.startDate);
        let days = [];
        let activeFound = 0;
        const hols = getHolidays(current.getFullYear());

        while (activeFound < state.numDays) {
            let iso = current.toISOString().split('T')[0];
            let dow = current.getDay();
            let isSelected = state.selectedDays.includes(dow);
            let holiday = hols[iso];

            if (isSelected) {
                days.push({
                    date: iso,
                    isOff: !!holiday,
                    holidayName: holiday,
                    activeIdx: holiday ? null : activeFound,
                    dayName: ['So','Mo','Di','Mi','Do','Fr','Sa'][dow]
                });
                if (!holiday) activeFound++;
            }
            current.setDate(current.getDate() + 1);
        }
        return days;
    }

    // --- UI RENDERING ---
    function renderTabs() {
        document.querySelectorAll('.tab').forEach(t => {
            t.classList.toggle('active', t.dataset.tab === state.activeTab);
        });
        document.querySelectorAll('.tab-panel').forEach(p => {
            p.classList.toggle('active', p.id === `tab-${state.activeTab}`);
        });
        if (state.activeTab === 'preview') renderPreview();
        if (state.activeTab === 'modules') renderModules();
    }

    function renderPreview() {
        const schedule = buildSchedule();
        const container = document.getElementById('previewContent');
        const stats = document.getElementById('statsRow');
        
        stats.innerHTML = `
            <div class="stat-card"><div class="stat-num">${state.numDays}</div><div class="stat-label">Tage</div></div>
            <div class="stat-card"><div class="stat-num">${schedule.length}</div><div class="stat-label">Gesamtzeitraum</div></div>
            <div class="stat-card"><div class="stat-num">${schedule.filter(d => d.isOff).length}</div><div class="stat-label">Feiertage</div></div>
        `;

        let html = `<table><tr><th>Datum</th><th>Tag</th><th>Status / Thema</th></tr>`;
        schedule.forEach(d => {
            html += `<tr class="${d.isOff ? 'row-off' : ''}">
                <td>${d.date}</td><td>${d.dayName}</td>
                <td>${d.isOff ? d.holidayName : 'Unterricht Tag ' + (d.activeIdx + 1)}</td>
            </tr>`;
        });
        container.innerHTML = html + `</table>`;
    }

    function renderModules() {
        const container = document.getElementById('moduleList');
        container.innerHTML = `<p class="info">Hier können Sie die Modulnamen anpassen. Automatisch generiert basierend auf ${state.numDays} Tagen.</p>`;
    }

    // --- EVENTS ---
    document.querySelector('.tab-bar').addEventListener('click', e => {
        if (e.target.classList.contains('tab')) {
            state.activeTab = e.target.dataset.tab;
            renderTabs();
        }
    });

    document.getElementById('weekdayGrid').addEventListener('click', e => {
        if (e.target.classList.contains('wd-btn')) {
            const day = parseInt(e.target.dataset.day);
            if (state.selectedDays.includes(day)) {
                state.selectedDays = state.selectedDays.filter(d => d !== day);
            } else {
                state.selectedDays.push(day);
            }
            document.querySelectorAll('.wd-btn').forEach(b => {
                b.classList.toggle('selected', state.selectedDays.includes(parseInt(b.dataset.day)));
            });
        }
    });

    document.getElementById('startDate').addEventListener('change', e => state.startDate = e.target.value);
    document.getElementById('numDays').addEventListener('input', e => state.numDays = parseInt(e.target.value));

    // --- DOCX GENERATION ---
    document.getElementById('downloadBtn').addEventListener('click', async () => {
        const { Document, Packer, Paragraph, TextRun, Table, TableRow, TableCell } = window.docx;
        const schedule = buildSchedule();

        const doc = new Document({
            sections: [{
                children: [
                    new Paragraph({ children: [new TextRun({ text: state.courseName, bold: true, size: 32 })] }),
                    new Paragraph({ text: "\n" }),
                    new Table({
                        rows: [
                            new TableRow({ children: [new TableCell({ children: [new Paragraph("Datum")] }), new TableCell({ children: [new Paragraph("Thema")] })] }),
                            ...schedule.map(d => new TableRow({
                                children: [
                                    new TableCell({ children: [new Paragraph(d.date)] }),
                                    new TableCell({ children: [new Paragraph(d.isOff ? d.holidayName : "Unterricht")] })
                                ]
                            }))
                        ]
                    })
                ]
            }]
        });

        const blob = await Packer.toBlob(doc);
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "Kursplan.docx";
        a.click();
    });

</script>
</body>
</html>

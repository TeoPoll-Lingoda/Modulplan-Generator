<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modulplan-Generator</title>
    <style>
        :root {
            --blue-dark: #1F4E79; --blue-mid: #2E75B6; --blue-light: #D6E8F7;
            --blue-tint: #EBF3FB; --red-bg: #FAECE7; --red-text: #C00000;
            --amber-bg: #FFF8E1; --amber-text: #7D5700; --green-bg: #E8F5E9;
            --green-text: #2E7D32; --grey-100: #F5F5F5; --grey-200: #E8E8E8;
            --grey-400: #9E9E9E; --grey-700: #424242; --text: #1A1A1A;
            --border: #DDDDDD; --radius: 8px; --radius-sm: 4px;
            --shadow: 0 1px 4px rgba(0,0,0,.08);
            font-family: 'Segoe UI', system-ui, sans-serif; font-size: 14px;
        }
        body { background: var(--grey-100); color: var(--text); min-height: 100vh; margin: 0; }
        #app { max-width: 800px; margin: 0 auto; padding-bottom: 3rem; }
        .app-header { background: var(--blue-dark); color: #fff; padding: 1rem 1.5rem; }
        .tab-bar { display: flex; background: #fff; border-bottom: 2px solid var(--grey-200); position: sticky; top: 0; z-index: 10; }
        .tab { flex: 1; padding: .75rem; border: none; background: none; cursor: pointer; border-bottom: 3px solid transparent; font-weight: 500; }
        .tab.active { color: var(--blue-dark); border-bottom-color: var(--blue-dark); }
        .tab-panel { display: none; padding: 1.25rem; }
        .tab-panel.active { display: block; }
        .card { background: #fff; border: 1px solid var(--border); border-radius: var(--radius); padding: 1.25rem; margin-bottom: 1rem; box-shadow: var(--shadow); }
        .field { margin-bottom: 1rem; }
        label { display: block; font-size: 0.8rem; margin-bottom: 0.3rem; color: var(--grey-700); }
        input, textarea { width: 100%; padding: 0.5rem; border: 1px solid var(--border); border-radius: var(--radius-sm); }
        .weekday-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
        .wd-btn { padding: 0.5rem; border: 1px solid var(--border); background: #fff; cursor: pointer; border-radius: var(--radius-sm); }
        .wd-btn.selected { background: var(--blue-tint); border-color: var(--blue-mid); }
        .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-bottom: 1rem; }
        .stat-card { background: #fff; padding: 1rem; border-radius: var(--radius); text-align: center; border: 1px solid var(--border); }
        .stat-num { font-size: 1.5rem; font-weight: bold; color: var(--blue-dark); }
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; background: #fff; }
        th, td { border: 1px solid var(--grey-200); padding: 0.75rem; text-align: left; }
        th { background: var(--grey-100); font-size: 0.75rem; text-transform: uppercase; }
        .row-off { background: var(--red-bg); color: var(--red-text); }
        .btn-primary { background: var(--blue-dark); color: white; padding: 0.75rem 1.5rem; border: none; border-radius: var(--radius-sm); cursor: pointer; width: 100%; font-weight: bold; margin-top: 1rem; }
        textarea { height: 150px; }
    </style>
</head>
<body>

<div id="app">
    <header class="app-header"><h1>Modulplan-Generator</h1></header>
    <nav class="tab-bar">
        <button class="tab active" data-tab="setup">Kursdetails</button>
        <button class="tab" data-tab="modules">Module & Themen</button>
        <button class="tab" data-tab="preview">Vorschau</button>
    </nav>

    <main id="main-content">
        <section id="tab-setup" class="tab-panel active">
            <div class="card">
                <h2>Kursdetails</h2>
                <div class="field">
                    <label>Kursname</label>
                    <input type="text" id="courseName" value="Job BSK – Bahninfrastruktur">
                </div>
                <div class="field">
                    <label>Beschreibung</label>
                    <textarea id="descText">Standard BAMF BSK Beschreibung...</textarea>
                </div>
            </div>
            <div class="card">
                <h2>Zeitplan</h2>
                <div class="field">
                    <label>Startdatum</label>
                    <input type="date" id="startDate" value="2026-05-27">
                </div>
                <div class="field">
                    <label>Anzahl Unterrichtstage</label>
                    <input type="number" id="numDays" value="36">
                </div>
                <label>Wochentage</label>
                <div class="weekday-grid" id="weekdayGrid">
                    <button class="wd-btn" data-day="1">Mo</button>
                    <button class="wd-btn" data-day="2">Di</button>
                    <button class="wd-btn selected" data-day="3">Mi</button>
                    <button class="wd-btn selected" data-day="4">Do</button>
                    <button class="wd-btn" data-day="5">Fr</button>
                    <button class="wd-btn" data-day="6">Sa</button>
                    <button class="wd-btn" data-day="0">So</button>
                </div>
            </div>
        </section>

        <section id="tab-modules" class="tab-panel">
            <div class="card">
                <h2>Module & Themen</h2>
                <div id="moduleList"></div>
            </div>
        </section>

        <section id="tab-preview" class="tab-panel">
            <div class="stats-row" id="statsRow"></div>
            <div id="previewContent"></div>
            <button class="btn-primary" id="downloadBtn">Als Word (.docx) speichern</button>
        </section>
    </main>
</div>

<script src="https://unpkg.com/docx@9.1.0/build/index.js" onerror="console.error('Company firewall blocked the Word Library!')"></script>

<script>
// We wait until the page is 100% ready
window.onload = function() {
    console.log("HEARTBEAT: The app brain has started!");

    // --- STATE ---
    const state = {
        courseName: 'Job BSK – Bahninfrastruktur',
        activeTab: 'setup',
        selectedDays: [3, 4],
        numDays: 36,
        startDate: '2026-05-27'
    };

    // --- TAB SWITCHING LOGIC ---
    const tabs = document.querySelectorAll('.tab');
    const panels = document.querySelectorAll('.tab-panel');

    tabs.forEach(button => {
        button.addEventListener('click', function() {
            const targetTab = this.getAttribute('data-tab');
            console.log("HEARTBEAT: User clicked tab -> " + targetTab);

            // 1. Remove 'active' from all tabs and panels
            tabs.forEach(t => t.classList.remove('active'));
            panels.forEach(p => p.classList.remove('active'));

            // 2. Add 'active' to the one we clicked
            this.classList.add('active');
            const targetPanel = document.getElementById('tab-' + targetTab);
            if (targetPanel) {
                targetPanel.classList.add('active');
            }

            // 3. Update the content of the new tab
            if (targetTab === 'preview') renderPreview();
            if (targetTab === 'modules') renderModules();
        });
    });

    // --- PREVIEW LOGIC ---
    function renderPreview() {
        console.log("HEARTBEAT: Drawing the Preview table...");
        const container = document.getElementById('previewContent');
        const stats = document.getElementById('statsRow');
        
        // Simple preview for now to test if it works
        stats.innerHTML = `<div class="stat-card"><strong>Status:</strong> Aktiv</div>`;
        container.innerHTML = `<p>Vorschau für <strong>${state.courseName}</strong> wird hier berechnet...</p>`;
    }

    function renderModules() {
        console.log("HEARTBEAT: Drawing the Modules list...");
        document.getElementById('moduleList').innerHTML = "<p>Module werden geladen...</p>";
    }

    // --- DOWNLOAD LOGIC ---
    document.getElementById('downloadBtn').addEventListener('click', async () => {
        if (!window.docx) {
            alert("Fehler: Die Word-Funktion wurde von Ihrer Firmen-IT blockiert.");
            return;
        }
        console.log("HEARTBEAT: Attempting Word Export...");
        // (Word export code would go here)
    });

    console.log("HEARTBEAT: Listeners attached. Try clicking the tabs now!");
};
</script>
</body>
</html>
